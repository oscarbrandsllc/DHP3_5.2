<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NFL Draft – Player Hit Rates</title>
  <!-- Tailwind (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 UMD (pin versions) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- PropTypes (required by some UMD builds like Recharts) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>

  <!-- Recharts UMD (global should be window.Recharts) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>

  <!-- Babel for in-browser JSX transpile (ok for demos/embeds) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body { height: auto; margin: 0; }
    #lib-error { display:none; }
  </style>
</head>
<body class="bg-[#0A0F1E] text-slate-100">
  <div id="root"></div>
  <div id="lib-error" class="mx-auto max-w-2xl p-4 text-sm text-red-300"></div>

  <script type="text/babel">
    // ---- SAFETY: wait until Recharts (and PropTypes) globals are available, then run ----
    function waitForLibs(maxMs = 7000) {
      return new Promise((resolve, reject) => {
        const start = Date.now();
        (function check(){
          const R = window.Recharts || window.recharts;
          const P = window.PropTypes;
          if (R && P) return resolve(R);
          if (Date.now() - start > maxMs) return reject(new Error('Required libs not found (Recharts/PropTypes)'));
          setTimeout(check, 50);
        })();
      });
    }

    function renderApp(Recharts) {
      const { ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, LabelList, LineChart, Line, Legend } = Recharts;

      // -------------------- DATA (exact values from user) --------------------
      const overall = [
        { rd: "1", hit: 78.4 },
        { rd: "2", hit: 47.7 },
        { rd: "3", hit: 38.5 },
        { rd: "4", hit: 18.0 },
        { rd: "5", hit: 15.0 },
        { rd: "6", hit: 14.1 },
        { rd: "7", hit: 9.4 },
      ];

      const positional = [
        { rd: "1", QB: 78, RB: 83, TE: 78, WR: 76 },
        { rd: "2", QB: 42, RB: 50, TE: 40, WR: 51 },
        { rd: "3", QB: 31, RB: 62, TE: 36, WR: 30 },
        { rd: "4", QB: 20, RB: 27, TE: 23, WR: 9 },
        { rd: "5", QB: 7, RB: 27, TE: 9, WR: 13 },
        { rd: "6", QB: 11, RB: 18, TE: 8, WR: 15 },
        { rd: "7", QB: 13, RB: 9, TE: 4, WR: 11 },
      ];

      const colors = {
        neonCyan: "#46E7FF",
        neonMagenta: "#FF41E1",
        neonPurple: "#9E5AF7",
        neonGreen: "#20F7A7",
        grid: "rgba(148,163,184,.14)",
        text: "#E2E8F0",
      };

      const card = "rounded-2xl shadow-xl shadow-cyan-500/10 ring-1 ring-white/5 bg-slate-900/60 backdrop-blur";
      const axisTickFormatter = (v) => `${v}%`;
      const barLabel = (v) => `${Number(v).toFixed(1)}%`;

      const Tip = ({ active, payload, label, unit = "%" }) => {
        if (active && payload && payload.length) {
          return (
            <div className="rounded-lg border border-white/10 bg-slate-900/90 px-3 py-2 text-xs text-slate-100 shadow-lg">
              <div className="font-medium text-slate-200">RD {label}</div>
              {payload.map((p, i) => (
                <div key={i} className="flex items-center gap-2">
                  <span className="inline-block h-2 w-2 rounded-full" style={{ background: p.color }} />
                  <span className="opacity-80">{p.name}</span>
                  <span className="ml-auto tabular-nums">{p.value}{unit}</span>
                </div>
              ))}
            </div>
          );
        }
        return null;
      };

      function App() {
        return (
          <div className="w-full">
            {/* Neon background */}
            <div
              aria-hidden
              className="pointer-events-none fixed inset-0 -z-10 opacity-[0.15]"
              style={{
                backgroundImage:
                  "radial-gradient(200px 200px at 0% 0%, rgba(0,255,255,.25), transparent 60%)," +
                  "radial-gradient(300px 180px at 100% 0%, rgba(255,0,200,.2), transparent 70%)," +
                  "radial-gradient(220px 220px at 0% 100%, rgba(0,200,255,.18), transparent 60%)," +
                  "radial-gradient(240px 160px at 100% 100%, rgba(160,100,255,.18), transparent 70%)",
              }}
            />

            {/* Top padding tightened so pill sits at page top */}
            <div className="mx-auto max-w-7xl px-3 pt-1 pb-0 md:pt-1 md:pb-0">
              <div className="mb-2 md:mb-3">
                <div className="inline-flex items-center gap-2 rounded-full border border-white/10 bg-slate-800/50 px-3 py-1 text-[10px] uppercase tracking-widest text-slate-300">
                  NFL Draft – Player Hit Rates
                </div>
                <h1 className="mt-1 text-3xl font-extrabold tracking-tight md:text-5xl">Hit Rate by Round</h1>
                <p className="mt-1 max-w-2xl text-sm text-slate-300 md:text-base">
                  2008-2020 NFL Draft, Overall & Positional Hit Rate Trends
                </p>
              </div>

              <div className="grid grid-cols-1 gap-4 md:grid-cols-2">
                {/* LEFT */}
                <section className={`${card} p-4 pb-2 md:p-5 md:pb-2`} data-testid="overall-card">
                  <div className="mb-2 flex items-center justify-between">
                    <h2 className="text-lg font-semibold md:text-xl">Overall Hit Probability</h2>
                    <div className="text-xs text-slate-400">All Positions × Round</div>
                  </div>
                  <div className="h-[270px] w-full">
                    <ResponsiveContainer>
                      <BarChart data={overall} margin={{ top: 10, right: 12, left: 28, bottom: 0 }}>
                        <defs>
                          <linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stopColor={colors.neonCyan} />
                            <stop offset="100%" stopColor={colors.neonMagenta} />
                          </linearGradient>
                        </defs>
                        <CartesianGrid stroke={colors.grid} vertical={false} />
                        <XAxis dataKey="rd" tickLine={false} axisLine={false} tick={{ fill: colors.text }} />
                        <YAxis width={72} tickLine={false} axisLine={false} domain={[0, 100]} tick={{ fill: colors.text }} tickFormatter={axisTickFormatter} />
                        <Tooltip content={<Tip unit="%" />} cursor={{ fill: "rgba(255,255,255,0.03)" }} />
                        <Bar dataKey="hit" name="Hit%" fill="url(#barFill)" radius={[12, 12, 8, 8]}>
                          <LabelList dataKey="hit" formatter={barLabel} position="top" className="fill-slate-200 text-[12px] drop-shadow-[0_0_8px_rgba(134,239,172,0.5)]" />
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                  <div className="mt-2 grid grid-cols-2 gap-2 text-xs text-slate-300 md:grid-cols-4" data-testid="round-tiles">
                    {overall.map((d) => (
                      <div key={d.rd} className="flex items-center gap-2 rounded-lg bg-slate-800/40 p-2 ring-1 ring-white/5">
                        <span className="inline-flex h-5 w-5 items-center justify-center rounded-md bg-slate-900/60 text-[11px] font-semibold ring-1 ring-white/10">{d.rd}</span>
                        <div className="tabular-nums font-medium">{d.hit.toFixed(1)}%</div>
                      </div>
                    ))}
                  </div>
                </section>

                {/* RIGHT */}
                <section className={`${card} p-4 pb-1 md:p-5 md:pb-1`} data-testid="positional-card">
                  <div className="mb-2 flex items-center justify-between">
                    <h2 className="text-lg font-semibold md:text-xl">Positional Hit Rate Trends by Round</h2>
                    <div className="flex items-center gap-3 text-xs">
                      <span className="flex items-center gap-1"><span className="h-2 w-2 rounded-full" style={{ background: colors.neonMagenta }}></span> QB</span>
                      <span className="flex items-center gap-1"><span className="h-2 w-2 rounded-full" style={{ background: colors.neonGreen }}></span> RB</span>
                      <span className="flex items-center gap-1"><span className="h-2 w-2 rounded-full" style={{ background: colors.neonPurple }}></span> TE</span>
                      <span className="flex items-center gap-1"><span className="h-2 w-2 rounded-full" style={{ background: colors.neonCyan }}></span> WR</span>
                    </div>
                  </div>
                  <div className="h-[320px] w-full">
                    <ResponsiveContainer>
                      <LineChart data={positional} margin={{ top: 2, right: 12, left: 28, bottom: 0 }}>
                        <CartesianGrid stroke={colors.grid} />
                        <XAxis dataKey="rd" tickLine={false} axisLine={false} tick={{ fill: colors.text }} />
                        <YAxis width={72} tickLine={false} axisLine={false} domain={[0, 100]} tick={{ fill: colors.text }} tickFormatter={axisTickFormatter} />
                        <Tooltip content={<Tip unit="%" />} cursor={{ stroke: "rgba(255,255,255,0.15)" }} />
                        <Legend wrapperStyle={{ color: colors.text }} iconType="circle" />
                        <Line type="monotone" name="QB" dataKey="QB" stroke={colors.neonMagenta} strokeWidth={3} dot={{ r: 3 }} activeDot={{ r: 5 }} />
                        <Line type="monotone" name="RB" dataKey="RB" stroke={colors.neonGreen} strokeWidth={3} dot={{ r: 3 }} activeDot={{ r: 5 }} />
                        <Line type="monotone" name="TE" dataKey="TE" stroke={colors.neonPurple} strokeWidth={3} dot={{ r: 3 }} activeDot={{ r: 5 }} />
                        <Line type="monotone" name="WR" dataKey="WR" stroke={colors.neonCyan} strokeWidth={3} dot={{ r: 3 }} activeDot={{ r: 5 }} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                  <p className="mt-0.5 text-xs text-slate-400">*Values are exact percentages provided. Lines show trend across rounds.</p>
                </section>
              </div>

              <div className="mt-2 flex justify-center">
                <div className="rounded-full border border-cyan-300/30 bg-gradient-to-r from-cyan-400/20 via-fuchsia-400/20 to-purple-400/20 px-4 py-2 text-xs font-semibold tracking-widest text-slate-200 ring-1 ring-white/10">
                  HIT RATE · All Positions & By Position
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);

      // -------------------- Diagnostics / test cases --------------------
      setTimeout(() => {
        const results = [];
        results.push({ name: 'PropTypes global exists', pass: !!window.PropTypes });
        results.push({ name: 'Recharts global exists', pass: !!(window.Recharts || window.recharts) });
        results.push({ name: 'Overall chart rendered', pass: !!document.querySelector('[data-testid="overall-card"] svg') });
        results.push({ name: 'Positional chart rendered', pass: !!document.querySelector('[data-testid="positional-card"] svg') });
        results.push({ name: 'Round 1 label present', pass: /78\.4%/.test(document.body.innerText) });
        results.push({ name: 'Legend has 4 items', pass: (document.querySelectorAll('.recharts-default-legend li').length >= 4) });
        results.push({ name: 'Seven round tiles', pass: (document.querySelectorAll('[data-testid="round-tiles"] > div').length === 7) });
        console.table(results.map(r => ({ Test: r.name, Pass: r.pass })));
      }, 700);
    }

    // Boot
    waitForLibs().then(renderApp).catch((err) => {
      const el = document.getElementById('lib-error');
      el.style.display = 'block';
      el.innerHTML = `
        <div class="${'rounded-xl border border-red-500/30 bg-red-900/20 p-4'}">
          <div class="font-semibold text-red-200 mb-1">Failed to load required libraries</div>
          <div class="text-red-100/80">${err.message}. If you're embedding in a sandbox with a strict Content Security Policy, allow scripts from cdnjs.cloudflare.com and unpkg.com or host the UMD files yourself.</div>
        </div>`;
      console.error('Library load failure:', err);
    });
  </script>
</body>
</html>
